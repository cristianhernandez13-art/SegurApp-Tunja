<div class="dash-container">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon stat-icon-blue">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <span class="stat-label">Total</span>
      <p class="stat-value">{{ stats.total }}</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-orange">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <span class="stat-label">Reportados</span>
      <p class="stat-value stat-value-orange">{{ stats.reportados }}</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-yellow">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <span class="stat-label">En proceso</span>
      <p class="stat-value stat-value-yellow">{{ stats.enProceso }}</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-green">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/>
        </svg>
      </div>
      <span class="stat-label">Resueltos</span>
      <p class="stat-value stat-value-green">{{ stats.resueltos }}</p>
    </div>
  </div>

  @if (urgentes.length > 0) {
    <div class="urgent-section">
      <div class="urgent-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/>
        </svg>
        <h2>Incidentes urgentes</h2>
      </div>
      <div class="urgent-list">
        @for (inc of urgentes; track inc.id) {
          <button class="urgent-item" (click)="verDetalle(inc.id)">
            <div class="type-icon-sm {{ typeColor(inc.type) }}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path [attr.d]="typeIcon(inc.type)"/>
              </svg>
            </div>
            <div class="urgent-item-text">
              <p class="urgent-item-title">{{ inc.title }}</p>
              <p class="urgent-item-location">{{ inc.location }}</p>
            </div>
          </button>
        }
      </div>
    </div>
  }

  <div class="recent-section">
    <div class="section-header">
      <h2>Reportes recientes</h2>
      <button class="ver-todos" (click)="irALista()">Ver todos</button>
    </div>
    <div class="recent-list">
      @for (inc of recientes; track inc.id) {
        <button class="recent-item" (click)="verDetalle(inc.id)">
          <div class="type-icon {{ typeColor(inc.type) }}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="typeIcon(inc.type)"/>
            </svg>
          </div>
          <div class="recent-item-body">
            <div class="recent-item-top">
              <p class="recent-item-title">{{ inc.title }}</p>
              <span class="status-badge status-{{ inc.status }}">{{ inc.status === 'en-proceso' ? 'En proceso' : (inc.status | titlecase) }}</span>
            </div>
            <p class="recent-item-location">{{ inc.location }}</p>
            <p class="recent-item-date">{{ inc.date | date:'dd MMM, HH:mm' }}</p>
          </div>
        </button>
      }
    </div>
  </div>

  <div class="actions-grid">
    <button class="action-btn action-map" (click)="irAMapa()">
      <div class="action-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/>
          <path d="M15 5.764v15"/><path d="M9 3.236v15"/>
        </svg>
      </div>
      <span>Ver mapa</span>
    </button>
    <button class="action-btn action-report" (click)="irAReportar()">
      <div class="action-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <span>Reportar</span>
    </button>
  </div>
</div>
